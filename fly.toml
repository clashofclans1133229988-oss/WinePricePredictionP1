# Fly.io configuration for Wine Price Prediction App
# This file tells Fly.io how to deploy your app

app = "wine-price-prediction"  # Change this to your desired app name

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024